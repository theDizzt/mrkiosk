<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERICA COFFEE</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <div class="device-frame">
      <header class="topbar">
        <div class="brand">ERICA COFFEE</div>
      </header>

      <!-- 첫 화면 -->
      <section id="screen-home" class="screen active">
        <div class="home-content">
          <h1>어서오세요</h1>
          <p>주문하시려면 아래 버튼을 눌러주세요</p>
          <div class="home-buttons">
            <button class="home-choice-button cta" onclick="selectDineType('매장')">
              <span class="home-choice-label">매장에서 먹고 갈게요</span>
              <img class="home-choice-image home-choice-image-store" src="images/매장.png" alt="매장 아이콘" />
            </button>
            <button class="home-choice-button" onclick="selectDineType('포장')">
              <span class="home-choice-label">포장해서 갈게요</span>
              <img class="home-choice-image" src="images/포장.png" alt="포장 아이콘" />
            </button>
          </div>
        </div>
      </section>

      <!-- 메뉴 화면 -->
      <section id="screen-menu" class="screen">
        <div class="kiosk-layout">

          <main class="menu-area">
            <div class="category-bar">
              <button class="category active" data-category="Coffee">Coffee</button>
              <button class="category" data-category="Tea">Tea</button>
              <button class="category" data-category="Ade/Juice">Ade / Juice</button>
              <button class="category" data-category="Beverage">Beverage</button>
              <button class="category" data-category="Blended">Blended</button>
            </div>

            <div id="menu-grid" class="menu-grid"></div>
          </main>

          <aside class="order-panel">
            <div class="order-header">
              <h2>주문 확인</h2>
              <p>담은 메뉴와 옵션을 확인해 주세요</p>
            </div>

            <div id="cart-list" class="cart-list">
            <div class="cart-empty">담은 메뉴가 없습니다</div>
            </div>

            <div class="order-bottom">
              <div class="order-total-row">
                <span>주문한 메뉴</span>
                <strong id="order-count">0개</strong>
              </div>

              <div class="order-total-row total">
                <span>총 금액</span>
                <strong id="total-price">0원</strong>
              </div>

              <button id="pay-button" class="checkout-button" onclick="goToPayment()" disabled>
                결제하기
              </button>
            </div>
          </aside>

      </div>
    </section>

      <!-- 결제 방식 선택 화면 -->
      <section id="screen-payment" class="screen">
        <div class="payment-layout">
          <div class="payment-receipt-panel">
            <h2 id="payment-dine-greeting" class="payment-receipt-greeting-title" aria-live="polite"></h2>
            <p class="payment-receipt-hint">메뉴와 옵션을 다시 한 번 확인해 주세요</p>
            <div class="payment-receipt-body">
              <div id="payment-receipt-items" class="payment-receipt-items"></div>
              <div class="receipt-summary payment-receipt-summary">
                <div>
                  <span class="summary-label">주문 메뉴</span>
                  <strong id="payment-order-count">0개</strong>
                </div>
                <div class="summary-right">
                  <span class="summary-label">총 결제 금액</span>
                  <strong id="payment-total-price">0원</strong>
                </div>
              </div>
            </div>
          </div>
          <aside class="payment-cta-panel">
            <div class="payment-cta-inner">
              <div class="payment-cta-label">결제 수단 선택</div>
              <h3 class="payment-cta-heading">결제 방법을 선택해 주세요</h3>
              <div class="payment-cta-buttons">
                <button type="button" class="payment-cta-btn" onclick="completePayment('카드')">카드</button>
                <button type="button" class="payment-cta-btn" onclick="completePayment('간편페이')">간편페이</button>
                <button type="button" class="payment-cta-btn" onclick="completePayment('기프티콘/쿠폰')">기프티콘/쿠폰</button>
              </div>
              <button type="button" class="payment-back-cta" onclick="showScreen('screen-menu')">메뉴창으로 돌아가기</button>
            </div>
          </aside>
        </div>
      </section>
    </div>
  </div>

  <!-- 옵션 모달 -->
  <div id="option-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <div>
          <h3 id="modal-menu-name">음료명</h3>
          <p>옵션을 선택해 주세요</p>
        </div>
      </div>

      <div class="option-group">
        <div class="option-title">온도</div>
        <div class="option-buttons" id="temp-options"></div>
      </div>

      <div class="option-group">
        <div class="option-title">당도</div>
        <div class="option-buttons" id="sweet-options"></div>
      </div>

      <div id="ice-group" class="option-group">
        <div class="option-title">얼음</div>
        <div class="option-buttons" id="ice-options"></div>
      </div>

      <div class="modal-footer">
        <button class="secondary" onclick="closeModal()">취소</button>
        <button id="add-to-cart-button" type="button" class="primary" onclick="addToCart()" disabled>
          장바구니 담기
        </button>
      </div>
    </div>
  </div>

  <!-- 토스트 -->
  <div id="toast" class="toast hidden">결제가 완료되었습니다.</div>

  <script src="script.js"></script>
</body>
</html>
